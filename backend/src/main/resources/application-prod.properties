# ====================================================================
#  PROD profile overlay — activate with -Dspring.profiles.active=prod
#  (or SPRING_PROFILES_ACTIVE=prod) when running on the VPS.
#
#  Only differences from the default profile go here. Everything else
#  is inherited from application.properties.
# ====================================================================

# --- OpenAPI / Swagger UI: disabled in prod ---
# The default profile (local Electron, dev) ships Swagger so engineers
# can poke the API. On the public VPS we do NOT want the full schema
# and an interactive playground exposed to the internet — disabling
# the springdoc beans here means /v3/api-docs/** and /swagger-ui/**
# stop existing entirely (404), regardless of SecurityConfig rules.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# --- Database: PostgreSQL for the hosted multi-tenant web deployment ---
# Supplied via env vars on the VPS. The desktop build never activates this
# profile, so it keeps using the embedded H2 from application.properties.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/savdopro}
spring.datasource.username=${DB_USER:savdopro}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate still never owns the schema — Flyway does (incl. the V15/V22 Java
# migrations, which use SQL-standard INFORMATION_SCHEMA and run on Postgres).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Web origin for the WebSocket handshake (and any cross-origin SPA) ---
# Pin to the merchant portal's real origin in production (comma-separated).
app.web.allowed-origins=${WEB_ALLOWED_ORIGINS:*}
